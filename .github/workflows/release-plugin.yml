name: Release Plugin ZIP

on:
  release:
    types:
      - published

jobs:
  build-zip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir -p dist
          mkdir -p "dist/morgao-webring-signature"
          rsync -a ./ "dist/morgao-webring-signature/" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "dist" \
            --exclude ".DS_Store"
          cd dist
          zip -rq "morgao-webring-signature.zip" "morgao-webring-signature"

      - name: Upload ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/morgao-webring-signature.zip
